# git-cliff configuration for Ralph
# Generates changelog entries from RQ-####: conventional commits
#
# RESPONSIBILITY:
#   Configures git-cliff to parse Ralph's "RQ-####: <summary>" commit pattern
#   and categorize entries into Keep a Changelog format (Added/Changed/Fixed/etc.)
#
# EXPLICITLY DOES NOT HANDLE:
#   - Non-RQ-#### commits (ignored by the commit_parsers patterns)
#   - Version bumping logic (handled by release.sh)
#   - Comparison link generation (managed manually in CHANGELOG.md)
#   - Commit bodies (only parses commit subject lines)
#
# CALLER INVARIANTS:
#   - Must be used with git-cliff >= 2.0
#   - Commit messages must follow "RQ-####: <Action> <description>" pattern
#   - Action keywords must match the patterns defined in commit_parsers
#   - CHANGELOG.md must exist with proper Unreleased section structure
#
# Usage:
#   git-cliff --config cliff.toml --unreleased  # Preview unreleased changes
#   git-cliff --config cliff.toml --bump        # Generate for version bump
#
# For full documentation: https://git-cliff.org/docs/configuration

[changelog]
# Header at the top of the changelog
header = "# Changelog\n\nAll notable changes to this project will be documented in this file.\n\nThe format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),\nand this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n"

# Body template using Tera syntax
# This generates the content between header and footer
# Using minus signs in Tera tags ({%-, -%}) to trim whitespace
body = """
{%- if version %}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{%- else %}
## [Unreleased]
{%- endif %}
{%- for group, commits in commits | group_by(attribute="group") %}

### {{ group | striptags | trim | upper_first }}
{%- for commit in commits %}
- {{ commit.message | upper_first }}
{%- endfor %}
{%- endfor %}
"""

# Footer with comparison links (managed manually in CHANGELOG.md)
footer = ""

# Remove leading/trailing whitespace from the body
trim = true

[git]
# Parse conventional commits (disabled - we use custom RQ-#### pattern)
conventional_commits = false

# Filter out unconventional commits (disabled - we want all RQ- commits)
filter_unconventional = false

# Split commits on newlines for parsing
split_commits = false

# Commit parsers to categorize commits
# Order matters - first match wins
# Note: We only process RQ-#### commits; others are filtered by filter_commits
commit_parsers = [
    # Added - new features
    { field = "message", pattern = "^RQ-[0-9]+: [Aa]dd", group = "Added" },
    { field = "message", pattern = "^RQ-[0-9]+: [Ii]mplement", group = "Added" },
    { field = "message", pattern = "^RQ-[0-9]+: [Cc]reate", group = "Added" },
    { field = "message", pattern = "^RQ-[0-9]+: [Ii]ntroduce", group = "Added" },
    { field = "message", pattern = "^RQ-[0-9]+: [Ee]nable", group = "Added" },

    # Fixed - bug fixes
    { field = "message", pattern = "^RQ-[0-9]+: [Ff]ix", group = "Fixed" },
    { field = "message", pattern = "^RQ-[0-9]+: [Bb]ugfix", group = "Fixed" },
    { field = "message", pattern = "^RQ-[0-9]+: [Rr]esolve", group = "Fixed" },
    { field = "message", pattern = "^RQ-[0-9]+: [Cc]orrect", group = "Fixed" },

    # Changed - modifications to existing functionality
    { field = "message", pattern = "^RQ-[0-9]+: [Uu]pdate", group = "Changed" },
    { field = "message", pattern = "^RQ-[0-9]+: [Cc]hange", group = "Changed" },
    { field = "message", pattern = "^RQ-[0-9]+: [Rr]efactor", group = "Changed" },
    { field = "message", pattern = "^RQ-[0-9]+: [Mm]odify", group = "Changed" },
    { field = "message", pattern = "^RQ-[0-9]+: [Ee]nhance", group = "Changed" },
    { field = "message", pattern = "^RQ-[0-9]+: [Ii]mprove", group = "Changed" },
    { field = "message", pattern = "^RQ-[0-9]+: [Rr]edesign", group = "Changed" },
    { field = "message", pattern = "^RQ-[0-9]+: [Rr]ework", group = "Changed" },
    { field = "message", pattern = "^RQ-[0-9]+: [Aa]ssess", group = "Changed" },
    { field = "message", pattern = "^RQ-[0-9]+: [Vv]erify", group = "Changed" },
    { field = "message", pattern = "^RQ-[0-9]+: [Dd]esign", group = "Changed" },
    { field = "message", pattern = "^RQ-[0-9]+: [Ii]ntegrate", group = "Changed" },

    # Removed - deprecated/removed features
    { field = "message", pattern = "^RQ-[0-9]+: [Rr]emove", group = "Removed" },
    { field = "message", pattern = "^RQ-[0-9]+: [Dd]elete", group = "Removed" },
    { field = "message", pattern = "^RQ-[0-9]+: [Dd]eprecate", group = "Removed" },

    # Security - security-related changes
    { field = "message", pattern = "^RQ-[0-9]+: [Ss]ecurity", group = "Security" },

    # Default - any other RQ-#### commit goes to Changed
    { field = "message", pattern = "^RQ-[0-9]+:", group = "Changed" },
]

# Don't filter commits - let commit_parsers handle categorization
filter_commits = false

# Protect breaking changes from being skipped
topo_order = false
sort_commits = "oldest"

# Link parsers for issue/PR references
link_parsers = [
    { pattern = "RQ-([0-9]+)", href = "https://github.com/mitchfultz/ralph/issues/$1" },
]

[bump]
features_always_bump_minor = false
breaking_always_bump_major = false
