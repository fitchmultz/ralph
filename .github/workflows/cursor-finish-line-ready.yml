# Purpose: Publish a PR-head GitHub check that turns green only after the demo Cursor
#   propagation automations have all completed successfully for the current PR head SHA.
# Responsibilities: Watch target Cursor Automation check completions, wait for the
#   full set to settle on the current PR head SHA, mirror readiness onto a dedicated
#   `Cursor Finish Line Ready` check run attached to that PR head SHA, and add/remove
#   a deterministic PR label that downstream Cursor automations can target while
#   suppressing stale superseded SHA results.
# Scope: Demo automation sequencing only; this is not canonical repository CI.
# Usage: Runs on check_run.completed for the three prerequisite check names only; resolves
#   the PR via REST when the webhook payload omits pull_requests (common for GitHub App
#   checks), then creates/updates a PR-visible check run via the Checks API.
# Invariants/Assumptions: Local `make agent-ci` remains the source-of-truth gate; the
#   three target Cursor Automation checks publish normal GitHub check runs on PR heads.
# Note: GitHub may skip firing check_run-triggered workflows when the *triggering* suite
#   was created by GitHub Actions; this flow is intended for App-published checks (or add
#   a complementary trigger such as workflow_run if prerequisites are Actions-only).

name: Cursor Finish Line Ready

on:
  check_run:
    types:
      - completed

permissions:
  checks: write
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: cursor-finish-line-ready-${{
    github.event.check_run.check_suite.head_branch ||
    github.event.check_run.check_suite.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  ready:
    name: Cursor Finish Line Ready
    runs-on: ubuntu-latest
    timeout-minutes: 40
    # check_run cannot be filtered in `on:`; skip unless a prerequisite check completed.
    if: >-
      contains(fromJSON('["Cursor Automation: Cross-Surface Coherence","Cursor
      Automation: Config Surface Sync","Cursor Automation: Idempotency Surface
      Propagator"]'), github.event.check_run.name)
    steps:
      - name: Wait for target Cursor automation checks on this PR head SHA
        uses: actions/github-script@v7
        with:
          script: |
            const requiredChecks = [
              'Cursor Automation: Cross-Surface Coherence',
              'Cursor Automation: Config Surface Sync',
              'Cursor Automation: Idempotency Surface Propagator',
            ];
            const finishLineCheckName = 'Cursor Finish Line Ready';
            const finishLineLabelName = 'cursor-finish-line-ready';
            const observed = context.payload.check_run;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = observed?.check_suite?.head_sha;
            const pollIntervalMs = 30_000;
            const deadlineMs = Date.now() + 35 * 60 * 1000;
            const detailsUrl = `${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            let finishLineCheckRunId = null;
            let finishLineLabelStateKey = null;

            if (!headSha) {
              core.setFailed('Missing check_suite.head_sha on check_run payload.');
              return;
            }

            core.info(`Observed check run ${observed.name} (${observed.status}/${observed.conclusion || 'n/a'}) for ${headSha}.`);

            let prs = (observed.pull_requests || []).filter(
              (pr) => pr.base?.repo?.full_name === `${owner}/${repo}`
            );
            if (prs.length === 0) {
              core.info(
                'check_run payload had no pull_requests; resolving PRs for head SHA via REST (common for GitHub App checks).'
              );
              const { data: associated } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: headSha,
              });
              prs = associated.filter(
                (pr) =>
                  pr.base?.repo?.full_name === `${owner}/${repo}` &&
                  pr.state === 'open'
              );
            }
            if (prs.length === 0) {
              core.notice(
                'No open pull request in this repository for this head SHA (payload and listPullRequestsAssociatedWithCommit); nothing to gate.'
              );
              return;
            }

            prs = Array.from(new Map(prs.map((pr) => [pr.number, pr])).values());

            const trackedPrNumbers = prs.map((pr) => pr.number);

            const formatPrLabel = (items) =>
              items.length > 0 ? items.map((pr) => `#${pr.number}`).join(', ') : 'none';

            const compareCheckRuns = (left, right) => {
              const leftKey = `${left.started_at || ''}|${left.completed_at || ''}|${left.id}`;
              const rightKey = `${right.started_at || ''}|${right.completed_at || ''}|${right.id}`;
              return leftKey.localeCompare(rightKey);
            };

            const pickLatestByName = (checkRuns) => {
              const latest = new Map();
              for (const run of checkRuns) {
                if (!requiredChecks.includes(run.name)) {
                  continue;
                }
                const previous = latest.get(run.name);
                if (!previous || compareCheckRuns(previous, run) < 0) {
                  latest.set(run.name, run);
                }
              }
              return latest;
            };

            const formatSnapshot = (snapshot) =>
              snapshot
                .map((entry) => {
                  const state =
                    entry.status === 'completed'
                      ? `${entry.status}/${entry.conclusion}`
                      : entry.status;
                  return `- ${entry.name}: ${state}`;
                })
                .join('\n');

            const findReusableFinishLineCheckRun = async () => {
              const { data } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: headSha,
                check_name: finishLineCheckName,
                per_page: 100,
              });
              const matches = (data.check_runs || [])
                .filter((run) => run.name === finishLineCheckName)
                .sort((left, right) => compareCheckRuns(right, left));
              return matches.find((run) => run.status !== 'completed') || null;
            };

            const upsertFinishLineCheckRun = async ({ status, conclusion, title, summary }) => {
              if (!finishLineCheckRunId) {
                const existing = await findReusableFinishLineCheckRun();
                if (existing) {
                  finishLineCheckRunId = existing.id;
                }
              }

              const output = { title, summary };

              if (finishLineCheckRunId) {
                const payload = {
                  owner,
                  repo,
                  check_run_id: finishLineCheckRunId,
                  status,
                  details_url: detailsUrl,
                  output,
                };
                if (status === 'completed') {
                  payload.conclusion = conclusion;
                  payload.completed_at = new Date().toISOString();
                }
                const { data } = await github.rest.checks.update(payload);
                finishLineCheckRunId = data.id;
                return data;
              }

              const payload = {
                owner,
                repo,
                name: finishLineCheckName,
                head_sha: headSha,
                status,
                details_url: detailsUrl,
                external_id: `cursor-finish-line-ready:${headSha}`,
                output,
              };
              if (status === 'completed') {
                payload.conclusion = conclusion;
                payload.completed_at = new Date().toISOString();
              } else {
                payload.started_at = new Date().toISOString();
              }
              const { data } = await github.rest.checks.create(payload);
              finishLineCheckRunId = data.id;
              return data;
            };

            const ensureFinishLineLabelDefinition = async () => {
              try {
                await github.rest.issues.getLabel({
                  owner,
                  repo,
                  name: finishLineLabelName,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                core.info(`Creating repository label ${finishLineLabelName}.`);
                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: finishLineLabelName,
                    color: '0e8a16',
                    description:
                      'Cursor automation prerequisites are ready for the current PR head SHA.',
                  });
                } catch (createError) {
                  if (createError.status !== 422) {
                    throw createError;
                  }
                }
              }
            };

            const loadTrackedPrs = async () => {
              const current = await Promise.all(
                trackedPrNumbers.map(async (pull_number) => {
                  try {
                    const { data } = await github.rest.pulls.get({
                      owner,
                      repo,
                      pull_number,
                    });
                    return data;
                  } catch (error) {
                    if (error.status === 404) {
                      return null;
                    }
                    throw error;
                  }
                })
              );

              return current.filter(
                (pr) =>
                  pr && pr.base?.repo?.full_name === `${owner}/${repo}` && pr.state === 'open'
              );
            };

            const partitionTrackedPrs = (currentPrs) => {
              const currentHeadPrs = [];
              const supersededPrs = [];

              for (const pr of currentPrs) {
                if (pr.head?.sha === headSha) {
                  currentHeadPrs.push(pr);
                } else {
                  supersededPrs.push(pr);
                }
              }

              return { currentHeadPrs, supersededPrs };
            };

            const formatSupersededPrSummary = (items) =>
              items.map((pr) => `- #${pr.number}: current head is ${pr.head?.sha || 'unknown'}`).join('\n');

            const syncFinishLineLabels = async ({ prsToSync, ready, reason }) => {
              const labelTarget = formatPrLabel(prsToSync);
              const stateKey = `${ready}:${prsToSync.map((pr) => pr.number).sort((left, right) => left - right).join(',')}`;
              if (finishLineLabelStateKey === stateKey) {
                return;
              }

              if (prsToSync.length === 0) {
                finishLineLabelStateKey = stateKey;
                return;
              }

              if (ready) {
                await ensureFinishLineLabelDefinition();
                for (const pr of prsToSync) {
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: pr.number,
                    labels: [finishLineLabelName],
                  });
                }
                core.notice(`Applied ${finishLineLabelName} to ${labelTarget} (${reason}).`);
              } else {
                for (const pr of prsToSync) {
                  try {
                    await github.rest.issues.removeLabel({
                      owner,
                      repo,
                      issue_number: pr.number,
                      name: finishLineLabelName,
                    });
                  } catch (error) {
                    if (error.status !== 404) {
                      throw error;
                    }
                  }
                }
                core.info(
                  `Ensured ${finishLineLabelName} is absent from ${labelTarget} (${reason}).`
                );
              }

              finishLineLabelStateKey = stateKey;
            };

            while (true) {
              const currentPrs = await loadTrackedPrs();
              if (currentPrs.length === 0) {
                core.notice(
                  `Tracked PRs #${trackedPrNumbers.join(', #')} are no longer open; nothing to gate.`
                );
                return;
              }

              const { currentHeadPrs, supersededPrs } = partitionTrackedPrs(currentPrs);
              const currentPrLabel = formatPrLabel(currentHeadPrs);
              const trackedPrLabel = formatPrLabel(currentPrs);

              await syncFinishLineLabels({
                prsToSync: supersededPrs,
                ready: false,
                reason: 'their current head SHA advanced beyond this readiness run',
              });

              if (currentHeadPrs.length === 0) {
                await upsertFinishLineCheckRun({
                  status: 'completed',
                  conclusion: 'neutral',
                  title: 'Cursor automation prerequisites superseded by newer PR head',
                  summary: [
                    `Tracked PRs: ${trackedPrLabel}`,
                    `Observed commit: ${headSha}`,
                    `Label: ${finishLineLabelName} (removed)`,
                    '',
                    'A newer commit became the current PR head before readiness completed. This stale SHA will not trigger PR Finish Line.',
                    '',
                    formatSupersededPrSummary(supersededPrs),
                  ].join('\n'),
                });
                core.notice(
                  `Skipping stale readiness result for ${headSha}; current PR heads moved on for ${trackedPrLabel}.`
                );
                return;
              }

              const { data } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: headSha,
                per_page: 100,
              });

              const latest = pickLatestByName(data.check_runs || []);
              const snapshot = requiredChecks.map((name) => {
                const run = latest.get(name);
                return {
                  name,
                  status: run?.status || 'missing',
                  conclusion: run?.conclusion || 'missing',
                };
              });

              core.info(`Current readiness snapshot for ${headSha}: ${JSON.stringify(snapshot)}`);

              const missing = snapshot.filter((entry) => entry.status === 'missing');
              const pending = snapshot.filter((entry) => entry.status !== 'missing' && entry.status !== 'completed');
              const failed = snapshot.filter(
                (entry) => entry.status === 'completed' && entry.conclusion !== 'success'
              );

              if (failed.length > 0) {
                const message = `Finish-line prerequisites failed for ${headSha}: ${failed.map((entry) => `${entry.name}=${entry.conclusion}`).join(', ')}`;
                await syncFinishLineLabels({
                  prsToSync: currentHeadPrs,
                  ready: false,
                  reason: 'a prerequisite check failed',
                });
                await upsertFinishLineCheckRun({
                  status: 'completed',
                  conclusion: 'failure',
                  title: 'Cursor automation prerequisites failed',
                  summary: [
                    `PRs: ${currentPrLabel}`,
                    `Commit: ${headSha}`,
                    `Label: ${finishLineLabelName} (removed)`,
                    '',
                    message,
                    '',
                    formatSnapshot(snapshot),
                  ].join('\n'),
                });
                core.setFailed(message);
                return;
              }

              if (missing.length === 0 && pending.length === 0) {
                const finalPrs = await loadTrackedPrs();
                const { currentHeadPrs: finalCurrentHeadPrs, supersededPrs: finalSupersededPrs } = partitionTrackedPrs(finalPrs);
                const finalPrLabel = formatPrLabel(finalCurrentHeadPrs);
                const finalTrackedPrLabel = formatPrLabel(finalPrs);

                await syncFinishLineLabels({
                  prsToSync: finalSupersededPrs,
                  ready: false,
                  reason: 'their current head SHA advanced beyond this readiness run',
                });

                if (finalCurrentHeadPrs.length === 0) {
                  await upsertFinishLineCheckRun({
                    status: 'completed',
                    conclusion: 'neutral',
                    title: 'Cursor automation prerequisites superseded by newer PR head',
                    summary: [
                      `Tracked PRs: ${finalTrackedPrLabel}`,
                      `Observed commit: ${headSha}`,
                      `Label: ${finishLineLabelName} (removed)`,
                      '',
                      'A newer commit became the current PR head just before readiness completed. This stale SHA will not trigger PR Finish Line.',
                      '',
                      formatSupersededPrSummary(finalSupersededPrs),
                    ].join('\n'),
                  });
                  core.notice(
                    `Skipping stale readiness result for ${headSha}; current PR heads moved on for ${finalTrackedPrLabel}.`
                  );
                  return;
                }

                await syncFinishLineLabels({
                  prsToSync: finalCurrentHeadPrs,
                  ready: true,
                  reason: 'all prerequisite checks succeeded on the current PR head SHA',
                });
                await upsertFinishLineCheckRun({
                  status: 'completed',
                  conclusion: 'success',
                  title: 'Cursor automation prerequisites ready',
                  summary: [
                    `PRs: ${finalPrLabel}`,
                    `Commit: ${headSha}`,
                    `Label: ${finishLineLabelName} (applied)`,
                    '',
                    'All required Cursor automation checks completed successfully on the current PR head SHA.',
                    '',
                    formatSnapshot(snapshot),
                  ].join('\n'),
                });
                core.notice(`All Cursor automation prerequisites completed successfully for ${headSha}.`);
                return;
              }

              if (Date.now() >= deadlineMs) {
                const message = `Timed out waiting for Cursor automation prerequisites on ${headSha}. Missing: ${missing.map((entry) => entry.name).join(', ') || 'none'}. Pending: ${pending.map((entry) => `${entry.name}=${entry.status}`).join(', ') || 'none'}.`;
                await syncFinishLineLabels({
                  prsToSync: currentHeadPrs,
                  ready: false,
                  reason: 'the readiness poll timed out',
                });
                await upsertFinishLineCheckRun({
                  status: 'completed',
                  conclusion: 'failure',
                  title: 'Cursor automation prerequisites timed out',
                  summary: [
                    `PRs: ${currentPrLabel}`,
                    `Commit: ${headSha}`,
                    `Label: ${finishLineLabelName} (removed)`,
                    '',
                    message,
                    '',
                    formatSnapshot(snapshot),
                  ].join('\n'),
                });
                core.setFailed(message);
                return;
              }

              await syncFinishLineLabels({
                prsToSync: currentHeadPrs,
                ready: false,
                reason: 'prerequisite checks are still pending',
              });
              await upsertFinishLineCheckRun({
                status: 'in_progress',
                title: 'Waiting for Cursor automation prerequisites',
                summary: [
                  `PRs: ${currentPrLabel}`,
                  `Commit: ${headSha}`,
                  `Label: ${finishLineLabelName} (not applied yet)`,
                  '',
                  'Waiting for all required Cursor automation checks to complete successfully on the current PR head SHA.',
                  '',
                  formatSnapshot(snapshot),
                ].join('\n'),
              });

              await new Promise((resolve) => setTimeout(resolve, pollIntervalMs));
            }
