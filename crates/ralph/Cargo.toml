[package]
name = "ralph"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "A Rust CLI for managing AI agent loops with a structured JSON task queue"
repository = "https://github.com/mitchfultz/ralph"
homepage = "https://github.com/mitchfultz/ralph"
readme = "../../README.md"
keywords = ["ai", "agent", "cli", "task-queue", "workflow"]
categories = ["command-line-utilities", "development-tools"]

[dependencies]
anyhow = "1.0.100"
clap = { version = "4.5.54", features = ["derive"] }
colored = "2"
ctrlc = "3.5.1"
dotenvy = "0.15.7"
env_logger = "0.11.8"
log = "0.4.29"
ratatui = "0.29.0"
crossterm = "0.28.0"
textwrap = "0.16"
unicode-width = "0.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0"
tempfile = "3.24.0"
regex = "1.11"
schemars = { version = "0.8", features = ["derive"] }
thiserror = "2.0.18"
time = { version = "0.3.45", features = ["formatting", "parsing", "macros"] }
dialoguer = { version = "0.11", features = ["fuzzy-select"] }
atty = "0.2"
notify-rust = { version = "4", optional = true }

# libc is only used on Unix platforms for process group control and PID liveness detection
[target.'cfg(unix)'.dependencies]
libc = "0.2.180"

# windows-sys is used on Windows platforms for PID liveness detection
[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = ["Win32_System_Threading", "Win32_Foundation"] }

[features]
default = ["notifications"]
notifications = ["notify-rust"]

[dev-dependencies]
serial_test = "3.0"
