[package]
name = "ralph"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
anyhow = "1.0.100"
clap = { version = "4.5.54", features = ["derive"] }
colored = "2"
ctrlc = "3.5.1"
dotenvy = "0.15.7"
env_logger = "0.11.8"
libc = "0.2.180"
log = "0.4.29"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9.34"
tempfile = "3.24.0"
regex = "1.11"
schemars = { version = "0.8", features = ["derive"] }
thiserror = "2.0.18"
time = { version = "0.3.45", features = ["formatting", "parsing", "macros"] }
