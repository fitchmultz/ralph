[package]
name = "ralph"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
ctrlc = "3.4"
dotenvy = "0.15"
env_logger = "0.11"
libc = "0.2"
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
tempfile = "3.10"
time = { version = "0.3", features = ["formatting", "parsing", "macros"] }
