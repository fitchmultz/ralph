  - id: RQ-0069
    status: done
    title: Backfill missing request and timestamps after scan or task build
    tags:
      - rust
      - queue
      - ux
    scope:
      - crates/ralph/src/scan_cmd.rs
      - crates/ralph/src/task_cmd.rs
      - crates/ralph/src/queue.rs
    evidence:
      - scan_cmd and task_cmd do not fill request or created_at and updated_at if runner omits them
    plan:
      - Detect newly added tasks lacking request or timestamps
