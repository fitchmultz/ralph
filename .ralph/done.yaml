version: 1
tasks:
  - id: RQ-0046
    status: done
    title: Eliminate data loss risk by enforcing clean-repo preflight for scan and any destructive revert path
    tags:
      - rust
      - safety
      - workflow
      - p0
    scope:
      - crates/ralph/src/scan_cmd.rs
      - crates/ralph/src/gitutil.rs
      - crates/ralph/src/task_cmd.rs
      - crates/ralph/src/run_cmd.rs
    evidence:
      - scan can run without a clean repo preflight while failure paths call revert_uncommitted
      - revert_uncommitted can delete untracked files and discard changes which is catastrophic if user work is present
      - production behavior must never destroy unrelated work
    plan:
      - require a clean repo before scan executes any runner invocation
      - audit all code paths that call revert_uncommitted and ensure they are gated behind an explicit clean-repo guarantee
      - add tests asserting dirty repo causes a hard stop with clear messaging
      - ensure error text is explicit about why the stop exists and how to proceed
    notes:
      - Added gitutil::require_clean_repo guard at start of run_scan in scan_cmd.rs
      - Aligns scan behavior with run_one and task_build safety preflights
      - Ensures scan_refuses_to_run_when_repo_is_dirty test passes correctly
    request: go-to-rust production readiness
    created_at: 2026-01-18T07:00:00Z
    updated_at: 2026-01-18T08:00:00Z
    completed_at: 2026-01-18T08:00:00Z

  - id: RQ-0005
    status: done
    title: Make Rust CLI defaults come from `.ralph/config.yaml` (runner/model/effort) instead of hardcoded flags
    tags:
      - rust
      - config
      - ux
    scope:
      - crates/ralph/src/config.rs
      - crates/ralph/src/main.rs
      - crates/ralph/src/runner.rs
      - ralph config
      - ralph scan
      - ralph task build
    evidence:
      - "`crates/ralph/src/main.rs` hardcodes defaults for flags like `scan --model` (default `gpt-5.2`) and `scan --effort` (default `high`) instead of using resolved config defaults."
      - "`crates/ralph/src/config.rs::resolve_from_cwd` loads `.ralph/config.yaml` (when present) and already resolves agent defaults (runner/model/reasoning_effort)."
      - "Hardcoded defaults drift from config defaults (see `crates/ralph/src/contracts.rs::Config::default` vs `ScanArgs` defaults), making runs inconsistent across machines."
    plan:
      - Use the RepoPrompt context_builder to gather context and generate plan.
      - Change CLI args to optional overrides (no default_value in clap) and compute effective runner/model/effort from resolved config in `handle_scan` and `handle_task`.
      - Ensure `runner::validate_model_for_runner` still runs after resolution and produces a clear error on invalid combinations.
      - Add tests covering default resolution with and without `.ralph/config.yaml`.
      - "Update `--help` text to document precedence: CLI flags override repo config, which overrides global config, which overrides defaults."
    notes:
      - CLI runner/model/effort flags now behave as overrides; defaults come from resolved config layers.
      - Added tests covering default resolution and invalid runner/model combinations.
    request: scan finding
    created_at: 2026-01-17T17:26:38Z
    updated_at: 2026-01-18T06:30:00Z
    completed_at: 2026-01-18T06:30:00Z

