  - id: RQ-0002
    status: done
    title: Align root docs for Rust rewrite vs Go legacy
    tags:
      - docs
      - rust
      - migration
    scope:
      - README.md
      - .ralph/README.md
      - crates/ralph/src/main.rs
      - Makefile
    evidence:
      - "README.md describes `ralph_tui/` as the active CLI/TUI, while `.ralph/README.md` states the repo is undergoing a Rust rewrite using `.ralph/queue.yaml`."
      - "The Rust CLI is implemented under `crates/ralph/src/main.rs` and exposes `ralph queue|config|run|task|scan`."
      - "The root `Makefile` only targets the Go CLI (`ralph_tui`) and does not mention the Rust rewrite, which risks confusion during migration."
    plan:
      - Clarify in `README.md` which CLI is canonical for queue/runner workflows today and how Go vs Rust coexist during migration.
      - Add a short mapping section (Go commands/screens ↔ Rust commands) to reduce user error.
      - Update `.ralph/README.md` to link to the canonical docs and list the minimal commands to get started with the Rust queue.
    notes:
      - Updated root README to clarify Rust is canonical, add done.yaml, and document Go/Rust mapping.
      - Updated `.ralph/README.md` with minimal Rust commands and done.yaml archive workflow.
      - Added CLI help text for queue subcommands to reduce confusion.
