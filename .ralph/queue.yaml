version: 1
tasks:
  - id: RQ-0050
    status: todo
    title: Harden git push behavior by removing upstream parsing fragility and improving no-upstream messaging
    tags:
      - rust
      - git
      - ux
      - p1
    scope:
      - crates/ralph/src/gitutil.rs
      - crates/ralph/src/run_cmd.rs
    evidence:
      - push logic parses upstream into remote and branch by splitting on slash which is brittle and unnecessary
      - missing upstream should produce actionable error messaging without corrupting queue state
      - production loops must fail safe when push is impossible
    plan:
      - replace push_upstream implementation to call git push using default upstream behavior without parsing origin slash branch
      - improve error messages for no upstream configured and permission failures
      - add tests for no-upstream error path using a temp git repo
    request: go-to-rust production readiness
    created_at: 2026-01-18T07:00:00Z
    updated_at: 2026-01-18T07:00:00Z

  - id: RQ-0051
    status: todo
    title: Align blocked semantics across prompts queue validation and supervisor behavior
    tags:
      - rust
      - ux
      - workflow
      - p1
    scope:
      - crates/ralph/assets/prompts/worker.md
      - crates/ralph/src/queue.rs
      - crates/ralph/src/run_cmd.rs
      - .ralph/README.md
    evidence:
      - worker prompt forbids status blocked while queue schema and CLI allow blocked
      - run_cmd treats blocked as a special case and may revert only uncommitted changes which is inconsistent with prompt rules
      - inconsistent semantics create friction and unpredictable production behavior
    plan:
      - choose one truth and enforce it end-to-end
      - if blocked is allowed then require blocked_reason and define supervisor behavior precisely
      - if blocked is forbidden then remove blocked from allowed statuses and CLI flags and update docs
      - update tests to match enforced behavior
    request: go-to-rust production readiness
    created_at: 2026-01-18T07:00:00Z
    updated_at: 2026-01-18T07:00:00Z

  - id: RQ-0052
    status: todo
    title: Add ralph doctor command to verify environment readiness and surface actionable diagnostics
    tags:
      - rust
      - ux
      - tooling
      - p1
    scope:
      - crates/ralph/src/main.rs
      - crates/ralph/src/config.rs
      - crates/ralph/src/gitutil.rs
      - crates/ralph/src/runner.rs
    evidence:
      - Go TUI surfaced status and configuration context while Rust CLI has no single readiness check
      - production use requires fast diagnosis for missing git runner binaries invalid queue state and missing upstream
      - absence of a doctor command increases support load and friction
    plan:
      - add ralph doctor that checks config paths queue validity git availability and runner binaries
      - print a concise report and exit non-zero on failures
      - add tests for missing files and missing binaries using PATH manipulation
    request: go-to-rust production readiness
    created_at: 2026-01-18T07:00:00Z
    updated_at: 2026-01-18T07:00:00Z

  - id: RQ-0053
    status: todo
    title: Implement a Go pin markdown to YAML queue migration tool to unblock real repo migrations
    tags:
      - rust
      - migration
      - tooling
      - p1
    scope:
      - crates/ralph/src/main.rs
      - crates/ralph/src/queue.rs
      - ralph_tui/internal/pin
    evidence:
      - Go version uses markdown pin queue format while Rust uses YAML queue format
      - existing repos need a deterministic conversion path to migrate real backlogs
      - manual conversions are error-prone and will slow adoption
    plan:
      - add a new command to import implementation_queue.md and map queue items into YAML tasks
      - map checkbox state to todo or done and map blocked section to blocked if supported
      - preserve id tags and scope when possible and require evidence and plan defaults when missing
      - validate output via queue validate and produce a migration report
    request: go-to-rust production readiness
    created_at: 2026-01-18T07:00:00Z
    updated_at: 2026-01-18T07:00:00Z

  - id: RQ-0054
    status: todo
    title: Provide non-runner queue authoring command for humans to add tasks without AI
    tags:
      - rust
      - queue
      - ux
      - p2
    scope:
      - crates/ralph/src/main.rs
      - crates/ralph/src/queue.rs
      - crates/ralph/src/timeutil.rs
    evidence:
      - Go version allowed direct editing flows while Rust relies on AI task builder or manual YAML edits
      - manual YAML edits are error-prone and increase friction for production users
      - a queue add command reduces syntax errors and accelerates adoption
    plan:
      - add ralph queue add with flags for title tags scope evidence plan
      - auto-fill id via next-id and timestamps via timeutil
      - insert at top or below a specified id and then validate
      - add tests for invalid input and insertion behavior
    request: go-to-rust production readiness
    created_at: 2026-01-18T07:00:00Z
    updated_at: 2026-01-18T07:00:00Z

  - id: RQ-0055
    status: todo
    title: Stabilize YAML scalar repair by replacing heuristic quoting with deterministic safe serialization rules
    tags:
      - rust
      - queue
      - yaml
      - p2
    scope:
      - crates/ralph/src/queue.rs
    evidence:
      - repair_yaml_scalars is heuristic and may over-edit or under-edit depending on content
      - invalid YAML can be produced by external runners and must be repaired safely and predictably
      - production tools must avoid silent mutation of valid content
    plan:
      - define exact safety rules for which scalars must be quoted and how
      - ensure the repair is idempotent and does not rewrite valid YAML unnecessarily
      - add tests for tricky cases including colon space braces and multi-line values
    request: go-to-rust production readiness
    created_at: 2026-01-18T07:00:00Z
    updated_at: 2026-01-18T07:00:00Z

