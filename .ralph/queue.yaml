- id: RQ-0112
  status: todo
  title: Implement task blocking/muting for temporary exclusions
  tags:
  - rust
  - queue
  - ux
  scope:
  - crates/ralph/src/contracts.rs
  - crates/ralph/src/run_cmd.rs
  - crates/ralph/src/main.rs
  evidence:
  - No way to temporarily exclude a task without deleting it or moving it to done
  - When a task is blocked (e.g., waiting for external dependency), it still appears as todo
  - Users may want to "skip this for now" without losing the task definition
  plan:
  - Add blocked field to Task (boolean, default false)
  - Update run_one to skip blocked tasks with a log message
  - Add queue block/unblock <task-id> commands
  - Add --blocked filter to queue list
  - Add tests for blocking behavior in run loop
  notes: []
  request: scan finding
