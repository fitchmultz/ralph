  title: Centralize RunnerKind and Model resolution logic
  tags:
  - rust
  - refactor
  scope:
  - crates/ralph/src/main.rs
  - crates/ralph/src/run_cmd.rs
  - crates/ralph/src/runner.rs
  evidence:
  - resolve_agent_args (main.rs) and resolve_run_agent_settings (run_cmd.rs) overlap significantly
  plan:
  - Consolidate resolution logic into runner.rs or a dedicated settings module
  - 'Ensure consistent precedence: CLI > task.agent > project config > global config > built-in'
  - Update main.rs, task_cmd.rs, scan_cmd.rs, and run_cmd.rs to use the centralized logic
  notes:
  - Created `runner::AgentSettings` struct and `resolve_agent_settings` function in `crates/ralph/src/runner.rs`.
  - Updated `crates/ralph/src/main.rs` to use `resolve_agent_settings` for `task` and `scan` commands.
  - Updated `crates/ralph/src/run_cmd.rs` to use `resolve_agent_settings` for `run one` and `run loop`.
  - Verified with `make ci`.
