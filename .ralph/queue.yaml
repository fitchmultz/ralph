  - id: RQ-0098
    status: todo
    title: Add debug logging for config resolution and repo root discovery
    tags:
      - rust
      - logging
      - config
    scope:
      - crates/ralph/src/config.rs
    evidence:
      - |-
        `find_repo_root` and `resolve_from_cwd` operate silently. If configuration
        loading fails or picks the wrong directory, it's difficult to debug without code changes.
    plan:
      - Add `log::debug!` statements to `find_repo_root` showing each directory checked.
      - Log the paths of global and project config files being loaded.
      - Log the final resolved paths for queue, done, and root.
    notes: []
    request: scan finding
    created_at: 2026-01-19T04:00:47Z
    updated_at: 2026-01-19T04:00:47Z
  - id: RQ-0104
    status: todo
    title: Audit and improve logging in fsutil sync operations
    tags:
      - rust
      - logging
      - fs
    scope:
      - crates/ralph/src/fsutil.rs
    evidence:
      - |-
        `sync_dir_best_effort` and other fs operations fail silently or without much
        context. While "best effort" implies silence, debug logs would be valuable.
    plan:
      - Add `log::debug!` or `log::trace!` to file synchronization and atomic write steps.
      - Include path information in these logs to help trace filesystem issues.
    notes: []
    request: scan finding
